# values.yaml（otelcol -> vector -> victorialogs 専用）

role: "Stateless-Aggregator"
replicas: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

extraContainerPorts:
  - name: otlp-http
    containerPort: 4318
    protocol: TCP
  - name: vector-api
    containerPort: 8686
    protocol: TCP

service:
  enabled: true
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: vector-api
      port: 8686
      targetPort: 8686
      protocol: TCP

customConfig:
  api:
    enabled: true
    address: 0.0.0.0:8686
    playground: false

  sources:
    otlp_in:
      type: http_server
      address: 0.0.0.0:4318
      path: /v1/logs
      decoding:
        codec: otlp

  transforms:
    otlp_tf:
      type: remap
      inputs: [otlp_in]
      source: |
        if !exists(.timestamp) || is_null(.timestamp) { .timestamp = now() }
  
        .namespace = if exists(.k8s.namespace.name) { .k8s.namespace.name } else { "unknown" }
        .pod       = if exists(.k8s.pod.name)       { .k8s.pod.name }       else { "unknown" }
        .container = if exists(.k8s.container.name) { .k8s.container.name } else { "unknown" }
  
        body = if exists(.message) { .message } else if exists(.body) { .body } else { . }
  
        .message = encode_json({
          "timestamp": .timestamp,
          "severity":  if exists(.severity) { .severity } else { null },
          "body":      body,
          "resource":  if exists(.resource) { .resource } else { null },
          "attributes": if exists(.attributes) { .attributes } else { null },
          "k8s": {
            "namespace": .namespace,
            "pod": .pod,
            "container": .container,
            "node": if exists(.k8s.node.name) { .k8s.node.name } else { null }
          }
        })
        del(.body)
        del(.attributes)
        del(.resource)
        del(.k8s)
        del(.severity)

  sinks:
    to_victorialogs:
      type: http
      inputs: [otlp_tf]
      uri: http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481/insert/jsonline
      method: post
      encoding:
        codec: json
      request:
        headers:
          Content-Type: application/stream+json
          VL-Msg-Field: message
          VL-Time-Field: timestamp
          VL-Stream-Fields: namespace,pod,container
