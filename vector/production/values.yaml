# values.yaml（otelcol -> vector -> victorialogs 専用）

role: "Stateless-Aggregator"
replicas: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

extraContainerPorts:
  - name: otlp-http
    containerPort: 4318
    protocol: TCP
  - name: vector-api
    containerPort: 8686
    protocol: TCP

service:
  enabled: true
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: vector-api
      port: 8686
      targetPort: 8686
      protocol: TCP

customConfig:
  api:
    enabled: true
    address: 0.0.0.0:8686
    playground: false

  sources:
    otlp_in:
      type: http_server
      address: 0.0.0.0:4318
      path: /v1/logs
      decoding:
        codec: otlp

  transforms:
    otlp_tf:
      type: remap
      inputs: [otlp_in]
      source: |
        if !exists(.timestamp) { .timestamp = now() }
        if exists(.k8s) && exists(.k8s.namespace) && exists(.k8s.namespace.name) {
          .namespace = .k8s.namespace.name
        } else {
          .namespace = "unknown"
        }
        if exists(.k8s) && exists(.k8s.pod) && exists(.k8s.pod.name) {
          .pod = .k8s.pod.name
        } else {
          .pod = "unknown"
        }
        if exists(.k8s) && exists(.k8s.container) && exists(.k8s.container.name) {
          .container = .k8s.container.name
        } else {
          .container = "unknown"
        }
        if exists(.k8s) && exists(.k8s.node) && exists(.k8s.node.name) {
          .node = .k8s.node.name
        } else {
          .node = null
        }
        body = null
        if exists(.message) {
          body = .message
        } else if exists(.body) {
          body = .body
        } else {
          body = .
        }
        sev = null
        if exists(.severity) { sev = .severity }
        res = null
        if exists(.resource) { res = .resource }
        attrs = null
        if exists(.attributes) { attrs = .attributes }
        .message = encode_json({
          "timestamp": .timestamp,
          "severity": sev,
          "body": body,
          "resource": res,
          "attributes": attrs,
          "k8s": {
            "namespace": .namespace,
            "pod": .pod,
            "container": .container,
            "node": .node
          }
        })
        del(.body)
        del(.attributes)
        del(.resource)
        del(.k8s)
        del(.severity)

  sinks:
    to_victorialogs:
      type: http
      inputs: [otlp_tf]
      uri: http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481/insert/jsonline
      method: post
      encoding:
        codec: json
      request:
        headers:
          Content-Type: application/stream+json
          VL-Msg-Field: message
          VL-Time-Field: timestamp
          VL-Stream-Fields: namespace,pod,container
