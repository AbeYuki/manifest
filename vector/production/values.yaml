# values.yaml（otelcol -> vector -> victorialogs 専用）

role: "Stateless-Aggregator"
replicas: 2

service:
  enabled: true
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

customConfig:
  api:
    enabled: true

  sources:
    otlp_in:
      type: opentelemetry
      grpc:
        address: 0.0.0.0:4317
      http:
        address: 0.0.0.0:4318

  transforms:
    to_full_json:
      type: remap
      inputs: [otlp_in]
      # messagem, k8s attributes 全部まとめて message(JSON文字列) に格納
      source: |
        .timestamp = now()  # or .timestamp = .timestamp ?? now()
        .namespace = .k8s.namespace.name ?? "unknown"
        .pod       = .k8s.pod.name ?? "unknown"
        .container = .k8s.container.name ?? "unknown"

        .message = encode_json({
          "timestamp": .timestamp,
          "severity": .severity ?? null,
          "body": .message ?? .body ?? null,
          "resource": .resource ?? null,
          "attributes": .attributes ?? null,
          "k8s": {
            "namespace": .namespace,
            "pod": .pod,
            "container": .container,
            "node": .k8s.node.name ?? null
          }
        })

  sinks:
    vlogs_jsonline:
      type: http
      inputs: [to_full_json]
      # VictoriaLogs公式の Vector HTTP(JSON) 例：/insert/jsonline + _msg_field/_time_field/_stream_fields :contentReference[oaicite:4]{index=4}
      uri: >-
        http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481/insert/jsonline
        ?_stream_fields=namespace,pod,container
        &_msg_field=message
        &_time_field=timestamp
      compression: gzip
      encoding:
        codec: json
      framing:
        method: newline_delimited
      healthcheck:
        enabled: false
      # vmauth/テナント分離する場合
      # request:
      #   headers:
      #     AccountID: "12"
      #     ProjectID: "34"
