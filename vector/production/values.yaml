# values.yaml（otelcol -> vector -> victorialogs 専用）

role: "Stateless-Aggregator"
replicas: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

extraContainerPorts:
  - name: otlp-http
    containerPort: 4318
    protocol: TCP
  - name: vector-api
    containerPort: 8686
    protocol: TCP

service:
  enabled: true
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: vector-api
      port: 8686
      targetPort: 8686
      protocol: TCP

customConfig:
  api:
    enabled: true
    address: 0.0.0.0:8686
    playground: false

  sources:
    otlp_in:
      type: http_server
      address: 0.0.0.0:4318
      path: /v1/logs
      decoding:
        codec: otlp

  transforms:
    otlp_tf:
      type: remap
      inputs: [otlp_in]
      source: |
        raw = to_string!(.message)
        obj, err = parse_json(raw)
        if err == null && is_object(obj) {
          . = obj
        } else {
          . = { "message": raw }
        }
        .timestamp = now()

  sinks:
    to_victorialogs:
      type: http
      inputs: [otlp_tf]
      uri: "http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481/insert/jsonline"
      method: post
      framing:
        method: newline_delimited
      encoding:
        codec: raw_message
      request:
        headers:
          Content-Type: application/x-ndjson
          VL-Msg-Field: message
          VL-Time-Field: timestamp
          VL-Stream-Fields: namespace,pod,container
