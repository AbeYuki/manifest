# values.yaml（otelcol -> vector -> victorialogs 専用）

role: "Stateless-Aggregator"
replicas: 2

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1024Mi

extraContainerPorts:
  - name: otlp-http
    containerPort: 4318
    protocol: TCP
  - name: vector-api
    containerPort: 8686
    protocol: TCP

service:
  enabled: true
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: vector-api
      port: 8686
      targetPort: 8686
      protocol: TCP

customConfig:
  api:
    enabled: true
    address: 0.0.0.0:8686
    playground: false

  sources:
    otlp_in:
      type: http_server
      address: 0.0.0.0:4318
      path: /v1/logs
      decoding:
        codec: otlp

  transforms:
    otlp_tf:
      type: remap
      inputs: [otlp_in]
      source: |
        .timestamp = .timestamp ?? now()
        .namespace = .k8s.namespace.name ?? "unknown"
        .pod       = .k8s.pod.name ?? "unknown"
        .container = .k8s.container.name ?? "unknown"
        .node      = .k8s.node.name ?? null
        body = .message ?? .body ?? .
        .message = encode_json({
          "timestamp": .timestamp,
          "severity": .severity ?? null,
          "body": body,
          "resource": .resource ?? null,
          "attributes": .attributes ?? null,
          "k8s": {
            "namespace": .namespace,
            "pod": .pod,
            "container": .container,
            "node": .node
          }
        })
        del(.body)
        del(.attributes)
        del(.resource)
        del(.k8s)
        del(.severity)

  sinks:
    to_victorialogs:
      type: http
      inputs: [otlp_tf]
      uri: http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481/insert/jsonline
      method: post
      headers:
        Content-Type: application/stream+json
        VL-Msg-Field: message
        VL-Time-Field: timestamp
        VL-Stream-Fields: namespace,pod,container
      encoding:
        codec: json
      batch:
        max_events: 1
