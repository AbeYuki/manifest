apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: aim4highergg@gmail.com
    privateKeySecretRef:
      name: sakuracloud-acme-account-key
    solvers:
    - dns01:
        webhook:
          groupName: acme.sakuracloud.aimhighergg.com
          solverName: sakuracloud-dns-solver
          config:
            zoneID: <path:secret/data/sakuracloud/dns#ZONE_ID | jsonParse>
            accessTokenRef:
              name: sakuracloud-dns-credentials
              key: accessToken
            accessTokenSecretRef:
              name: sakuracloud-dns-credentials
              key: accessTokenSecret
