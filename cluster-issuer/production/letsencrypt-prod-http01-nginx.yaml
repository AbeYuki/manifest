apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-http01-nginx
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: aim4highergg@gmail.com
    privateKeySecretRef:
      name: nginx-acme-account-key
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx
