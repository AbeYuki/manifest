mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.145.0"
  pullPolicy: IfNotPresent

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
    storeCheckpoints: false

  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: false
    extractAllPodAnnotations: false

# control plane の taint を許可
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

config:
  receivers:
    filelog:
      operators:
        #- id: container-parser
        #  max_log_size: 102400
        #  type: container
        - id: parse-cri
          type: regex_parser
          regex: '^(?P<ts>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) (?P<log>.*)$'
          parse_from: body
        - id: set-body
          type: move
          from: attributes.log
          to: body
          if: 'attributes.log != nil'
        - id: try-json
          type: json_parser
          parse_from: body
          parse_to: attributes
          on_error: send
        - id: message-from-msg
          type: add
          field: attributes.message
          value: EXPR(attributes.msg)
          if: 'attributes.message == nil && attributes.msg != nil'
        - id: message-from-body
          type: add
          field: attributes.message
          value: EXPR(body)
          if: 'attributes.message == nil'  
  exporters:
    # VictoriaLogs へ OTLP/HTTP Logs
    otlphttp/victorialogs:
      # VictoriaLogs が受ける Logs ingest endpoint  
      logs_endpoint: http://victoria-logs-cluster-vlinsert.monitoring.svc.cluster.local:9481/insert/opentelemetry/v1/logs
      #logs_endpoint: http://vector.monitoring.svc.cluster.local:4318/v1/logs
      # vmauth 経由の場合は Authorization やヘッダを付ける
      # headers:
      #   Authorization: "Bearer <token>"
  processors:
    # 低カーディナリティ：必要最低限の k8s メタデータだけを resource attribute として付与する場合
    k8sattributes:
      auth_type: serviceAccount
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
        #  - k8s.pod.uid
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.deployment.name
          - k8s.replicaset.name
        #  - k8s.replicaset.uid
          - k8s.daemonset.name
        #  - k8s.daemonset.uid
          - k8s.job.name
        #  - k8s.job.uid
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.statefulset.name
        #  - k8s.statefulset.uid
          - container.image.tag
          - container.image.name
          - k8s.cluster.uid
          - service.namespace
          - service.name
          - service.version
        #  - service.instance.id
    # 高カーディナリティになりがちな属性を削る場合
    attributes/drop_high_card:
      actions:
        - key: request_id
          action: delete
        - key: trace_id
          action: delete
        - key: span_id
          action: delete
        - key: http.user_agent
          action: delete
        - key: client.address
          action: delete
        - key: url.full
          action: delete
    transform/cleanup:
      log_statements:
        - context: log
          statements:
            # message があるなら msg/log を消す
            - delete_key(attributes, "msg") where attributes["message"] != nil
            - delete_key(attributes, "log") where attributes["message"] != nil
  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors:
          - memory_limiter
          - k8sattributes
          - transform/cleanup
          - attributes/drop_high_card
          - batch
        exporters:
          - otlphttp/victorialogs
          - debug
