apiVersion: builtin
kind: LabelTransformer
metadata:
  name: label-transformer-<path:secret/data/viteful/production/env#VITE_LOCATION_NAME_2>
labels:
  app: viteful-frontend-<path:secret/data/viteful/production/env#VITE_LOCATION_NAME_2>
fieldSpecs:
  - path: metadata/labels
    create: true
  - path: spec/selector/matchLabels
    kind: Deployment
    create: true
  - path: spec/template/metadata/labels
    kind: Deployment
    create: true
